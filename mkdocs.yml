site_name: W3Pilot
site_description: Go browser automation library using WebDriver BiDi and Chrome DevTools Protocol
site_url: https://plexusone.github.io/w3pilot/
repo_url: https://github.com/plexusone/w3pilot
repo_name: plexusone/w3pilot

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Prerequisites: getting-started/prerequisites.md
  - User Guide:
    - Go Client SDK: guide/sdk.md
    - AI Agent Ergonomics: guide/ai-agents.md
    - MCP Server: guide/mcp-server.md
    - CDP Features: guide/cdp.md
    - Human-in-the-Loop: guide/hitl.md
    - CLI Reference: guide/cli.md
    - Script Runner: guide/scripts.md
    - Session Recording: guide/recording.md
    - CI/CD Integration: guide/cicd.md
  - Reference:
    - API Reference: reference/api.md
    - MCP Tools: reference/mcp-tools.md
    - Script Schema: reference/script-schema.md
    - Error Types: reference/errors.md
    - Feature Comparison: reference/comparison.md
  - Architecture:
    - Overview: architecture/overview.md
    - Product Requirements: architecture/prd.md
    - Technical Design: architecture/trd.md
  - Development:
    - Contributing: development/contributing.md
    - Testing: development/testing.md
    - Changelog: development/changelog.md
  - Releases:
    - v0.8.0: releases/v0.8.0.md
    - v0.7.0: releases/v0.7.0.md
    - v0.6.0: releases/v0.6.0.md
    - v0.5.0: releases/v0.5.0.md
    - v0.4.0: releases/v0.4.0.md
    - v0.3.0: releases/v0.3.0.md
    - v0.2.0: releases/v0.2.0.md
    - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/w3pilot
